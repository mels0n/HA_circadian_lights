circadian_lighting:
  input_number:
    circadian_min_kelvin:
      name: Circadian Min Kelvin
      min: 1500
      max: 9000
      step: 100
      initial: 2500
      icon: mdi:thermometer-low
    
    circadian_max_kelvin:
      name: Circadian Max Kelvin
      min: 1500
      max: 9000
      step: 100
      initial: 6000
      icon: mdi:thermometer-high

    circadian_min_brightness:
      name: Circadian Min Brightness
      min: 1
      max: 255
      step: 1
      initial: 150
      icon: mdi:brightness-5

    circadian_max_brightness:
      name: Circadian Max Brightness
      min: 1
      max: 255
      step: 1
      initial: 255
      icon: mdi:brightness-7

  template:
    - sensor:
        - name: "Circadian Color Temp"
          unique_id: circadian_color_temp
          unit_of_measurement: "K"
          icon: mdi:thermometer-lines
          state: >-
                {% set ts_dawn = as_timestamp(states("sensor.today_dawn"), none) %}
                {% set ts_noon = as_timestamp(states("sensor.today_noon"), none) %}
                {% set ts_dusk = as_timestamp(states("sensor.today_dusk"), none) %}
                {% if ts_dawn is none or ts_noon is none or ts_dusk is none %}
                {{ 2500 }}
                {% else %}
                {% set ts_now = as_timestamp(now()) %}
                {% set percent_before_noon = (ts_now - ts_dawn) / (ts_noon - ts_dawn) | round(2) %}
                {% set percent_after_noon = (ts_now - ts_noon) / ((ts_dusk + 7200) - ts_noon) | round(2) %}
                {% set base_color_temp =
                    (9000 - 2500) * percent_before_noon + 2500 if ts_now < ts_noon and ts_now >= ts_dawn else
                    (9000 - 2500) * (1 - percent_after_noon) + 2500 if ts_now >= ts_noon and ts_now <= (ts_dusk + 7200) else
                    2500 %}
                {{ [base_color_temp, 2500] | max | round(0) }}
                {% endif %}

        - name: "Circadian Brightness"
          unique_id: circadian_brightness
          unit_of_measurement: ""
          icon: mdi:brightness-auto
          state: >-
                {% set ts_dawn = as_timestamp(states("sensor.today_dawn"), none) %}
                {% set ts_noon = as_timestamp(states("sensor.today_noon"), none) %}
                {% set ts_dusk = as_timestamp(states("sensor.today_dusk"), none) %}
                {% if ts_dawn is none or ts_noon is none or ts_dusk is none %}
                {{ 150 }}
                {% else %}
                {% set ts_now = as_timestamp(now()) %}
                {% set percent_before_noon = (ts_now - ts_dawn) / (ts_noon - ts_dawn) | round(2) %}
                {% set percent_after_noon = (ts_now - ts_noon) / ((ts_dusk + 7200) - ts_noon) | round(2) %}
                {% set base_brightness =
                    (255 - 150) * percent_before_noon + 150 if ts_now < ts_noon and ts_now >= ts_dawn else
                    (255 - 150) * (1 - percent_after_noon) + 150 if ts_now >= ts_noon and ts_now <= (ts_dusk + 7200) else
                    150
                %}
                {{ [base_brightness, 150] | max | round(0) }}
                {% endif %}

        - name: "Circadian Target Lights"
          unique_id: "circadian_target_lights"
          state: >-
            {{ this.attributes.get('entity_id', []) | count }}
          attributes:
            entity_id: >-
              {%- set T = states("sensor.circadian_color_temp") | int(0) %}
              {%- set B = states("sensor.circadian_brightness") | int(0) %}
              {%- if T == 0 and B == 0 %}{{ [] | list }}{%- else %}

              {# Device capability ranges #}
              {%- set T_min, T_max = 1500, 9000 %}
              {%- set B_min, B_max = 0, 255 %}
    
              {# Full-range widths #}
              {%- set T_width = T_max - T_min %}
              {%- set B_width = B_max - B_min %}

              {# ±10% of full range #}
              {%- set T_margin = (0.1 * T_width) | int %}
              {%- set B_margin = (0.1 * B_width) | int %}

              {# Compute actual allowed windows, clamped to device limits #}
              {%- set T_low = [T_min, T - T_margin] | max %}
              {%- set T_high = [T_max, T + T_margin] | min %}
              {%- set B_low = [B_min, B - B_margin] | max %}
              {%- set B_high = [B_max, B + B_margin] | min %}

              {# Off lights that support color_temp #}
              {%- set lightsOff = expand(states.light)
                | selectattr("state", "==", "off")
                | selectattr("attributes.supported_color_modes", "defined")
                | selectattr("attributes.supported_color_modes", "contains", "color_temp")
                | map(attribute="entity_id")
                | list %}

              {# On lights in color_temp mode within ±10% window #}
              {%- set lightsOn = expand(states.light)
                | selectattr("state", "==", "on")
                | selectattr("attributes.color_mode", "defined")
                | selectattr("attributes.color_mode", "==", "color_temp")
                | selectattr("attributes.color_temp_kelvin", "defined")
                | selectattr("attributes.color_temp_kelvin", ">=", T_low)
                | selectattr("attributes.color_temp_kelvin", "<=", T_high)
                | selectattr("attributes.brightness", "defined")
                | selectattr("attributes.brightness", ">=", B_low)
                | selectattr("attributes.brightness", "<=", B_high)
                | map(attribute="entity_id")
                | list %}
    
              {{ (lightsOn + lightsOff) | unique | select('defined') | list }}{%- endif %}
